# Run from this directory on the Docker host:
#   cp .env.example .env   # then fill in the values
#   docker compose up -d --build
services:
  phev:
    build:
      context: ..
      dockerfile: Dockerfile
    image: phev-sweetspot:latest
    container_name: phev-sweetspot
    restart: unless-stopped
    env_file: .env
    volumes:
      - phev-data:/data          # SQLite DB persists here across restarts/updates
    ports:
      - "${APP_PORT:-8082}:8000" # host:container — reach it at http://<host>:8082
    networks:
      - proxy                    # also reachable by name on the proxy network (port 8000)

volumes:
  phev-data:

# Nginx Proxy Manager forwards to this container by name on the shared docker network.
# Find NPM's network with:  docker network ls   (often "npm_default" or "npm-network").
networks:
  proxy:
    external: true
    name: ${PROXY_NETWORK:-npm_default}
